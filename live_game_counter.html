<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Worldwide Live Game Counter</title>
    <link rel="stylesheet" type="text/css" href="/css/basscss.min.css">
    <script type="text/javascript" src="js/jquery/jquery-2.1.4.min.js"></script>
    <script type="text/javascript" src="/templates/templates.js"></script>
    <script type="text/javascript" src="/templates/ga.js"></script>
    <link rel="shortcut icon" type="image/png" href="/favicon.png">

    <style>
      .counter-block { margin-bottom: 3rem; }
      .counter-label { font-size: 1.25rem; color: #555; }

      .flip-counter {
        display: inline-flex;
        gap: 6px;
        perspective: 400px;
      }
      .flip-digit {
        position: relative;
        width: 64px;
        height: 96px;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 72px;
        font-weight: bold;
        color: #fff;
      }
      .flip-digit .half {
        position: absolute;
        left: 0;
        width: 100%;
        height: 50%;
        overflow: hidden;
        background: #222;
        backface-visibility: hidden;
      }
      .flip-digit .half span {
        position: absolute;
        left: 0;
        width: 100%;
        height: 96px;
        line-height: 96px;
        text-align: center;
      }
      .flip-digit .top { top: 0; border-radius: 6px 6px 0 0; border-bottom: 1px solid #000; }
      .flip-digit .top span { top: 0; }
      .flip-digit .bottom { bottom: 0; border-radius: 0 0 6px 6px; }
      .flip-digit .bottom span { bottom: 0; }

      .flip-digit .flip-top,
      .flip-digit .flip-bottom { z-index: 2; }
      .flip-digit .flip-top {
        transform-origin: bottom;
        animation: flipTop 0.25s ease-in forwards;
      }
      .flip-digit .flip-bottom {
        transform: rotateX(90deg);
        transform-origin: top;
        animation: flipBottom 0.25s ease-out 0.25s forwards;
      }
      @keyframes flipTop {
        from { transform: rotateX(0deg); }
        to   { transform: rotateX(-90deg); }
      }
      @keyframes flipBottom {
        from { transform: rotateX(90deg); }
        to   { transform: rotateX(0deg); }
      }

      .updated-note { color: #777; font-size: 0.875rem; }

      .match-list { margin-top: 0.5rem; max-width: 44rem; }
      .match-list summary {
        cursor: pointer;
        color: #0074d9;
        font-size: 0.875rem;
        user-select: none;
      }
      .match-row {
        padding: 0.4rem 0;
        border-bottom: 1px solid #eee;
        font-size: 0.875rem;
      }
      .match-row .teams { font-weight: bold; }
      .match-row .meta { color: #777; }

    </style>
  </head>
  <body>
    <div id="navHeader"></div>

    <section class="container px2 py2">
      <h1>Worldwide Live Game Counter</h1>

      <div class="counter-block">
        <div class="flip-counter" id="soccerCounter" aria-live="polite"></div>
        <p class="counter-label">professional soccer matches being played right now</p>
        <details class="match-list">
          <summary>Show the matches</summary>
          <div id="soccerMatches"></div>
        </details>
      </div>

      <div class="counter-block">
        <div class="flip-counter" id="cricketCounter" aria-live="polite"></div>
        <p class="counter-label">professional cricket matches being played right now</p>
        <details class="match-list">
          <summary>Show the matches</summary>
          <div id="cricketMatches"></div>
        </details>
      </div>

      <p class="updated-note" id="updatedNote">Loading live match data&hellip;</p>
      <p class="updated-note">
        Soccer data from <a href="https://www.365scores.com/">365Scores</a>,
        cricket data from <a href="https://www.espncricinfo.com/">ESPNcricinfo</a>.
        Updates every minute.
      </p>
    </section>

    <div id="navFooter"></div>

    <script>
      (function () {
        var MIN_DIGITS = 3;
        var REFRESH_MS = 60 * 1000;
        var FLIP_MS = 500;

        function makeHalf(className, digit) {
          var half = document.createElement("div");
          half.className = "half " + className;
          var span = document.createElement("span");
          span.textContent = digit;
          half.appendChild(span);
          return half;
        }

        function buildDigit(digit) {
          var el = document.createElement("div");
          el.className = "flip-digit";
          el.dataset.value = digit;
          el.appendChild(makeHalf("top", digit));
          el.appendChild(makeHalf("bottom", digit));
          return el;
        }

        function flipDigit(el, digit) {
          if (el.dataset.value === digit) return;
          var oldDigit = el.dataset.value;
          el.dataset.value = digit;

          // Static faces: top shows the new digit, bottom keeps the old one
          // until the animated bottom flap lands on it.
          el.querySelector(".top span").textContent = digit;

          var flipTop = makeHalf("top flip-top", oldDigit);
          var flipBottom = makeHalf("bottom flip-bottom", digit);
          el.appendChild(flipTop);
          el.appendChild(flipBottom);

          setTimeout(function () {
            el.querySelector(".bottom span").textContent = digit;
            flipTop.remove();
            flipBottom.remove();
          }, FLIP_MS);
        }

        function setCounter(container, value) {
          var digits = String(value);
          while (digits.length < MIN_DIGITS) digits = "0" + digits;

          while (container.children.length > digits.length) {
            container.removeChild(container.firstChild);
          }
          while (container.children.length < digits.length) {
            container.insertBefore(buildDigit("0"), container.firstChild);
          }
          for (var i = 0; i < digits.length; i++) {
            flipDigit(container.children[i], digits[i]);
          }
        }

        function fetchSoccerMatches() {
          var url = "https://webws.365scores.com/web/games/current/" +
            "?appTypeId=5&langId=1&timezoneName=UTC&sports=1&onlyLiveGames=true";
          return fetch(url)
            .then(function (r) { return r.json(); })
            .then(function (data) {
              var countries = {};
              (data.countries || []).forEach(function (c) { countries[c.id] = c.name; });
              var competitions = {};
              (data.competitions || []).forEach(function (c) { competitions[c.id] = c; });

              return (data.games || []).filter(function (g) {
                return g.statusGroup === 3;
              }).map(function (g) {
                var comp = competitions[g.competitionId] || {};
                var country = countries[comp.countryId];
                return {
                  teams: g.homeCompetitor.name + " " + Math.round(g.homeCompetitor.score) +
                    " – " + Math.round(g.awayCompetitor.score) + " " + g.awayCompetitor.name,
                  meta: [g.gameTimeDisplay || g.statusText,
                         g.competitionDisplayName + (country ? " (" + country + ")" : "")]
                    .filter(Boolean).join(" · ")
                };
              });
            });
        }

        function fetchCricketMatches() {
          var url = "https://site.web.api.espn.com/apis/v2/scoreboard/header?sport=cricket";
          return fetch(url)
            .then(function (r) { return r.json(); })
            .then(function (data) {
              var matches = [];
              (data.sports || []).forEach(function (sport) {
                (sport.leagues || []).forEach(function (league) {
                  (league.events || []).forEach(function (event) {
                    if (event.status !== "in") return;
                    var hasScores = (event.competitors || []).some(function (c) { return c.score; });
                    var scores = hasScores ? (event.competitors || []).map(function (c) {
                      return c.abbreviation + (c.score ? " " + c.score : "");
                    }).join(" v ") : "";
                    var status = (event.fullStatus && event.fullStatus.summary) || event.summary;
                    matches.push({
                      teams: event.name,
                      meta: [scores, status, league.name].filter(Boolean).join(" · ")
                    });
                  });
                });
              });
              return matches;
            });
        }

        function renderMatches(container, matches) {
          container.textContent = "";
          matches.forEach(function (m) {
            var row = document.createElement("div");
            row.className = "match-row";
            var teams = document.createElement("span");
            teams.className = "teams";
            teams.textContent = m.teams;
            var meta = document.createElement("div");
            meta.className = "meta";
            meta.textContent = m.meta;
            row.appendChild(teams);
            row.appendChild(meta);
            container.appendChild(row);
          });
          if (!matches.length) {
            var none = document.createElement("div");
            none.className = "match-row meta";
            none.textContent = "No matches in progress.";
            container.appendChild(none);
          }
        }

        var soccerEl = document.getElementById("soccerCounter");
        var cricketEl = document.getElementById("cricketCounter");
        var soccerListEl = document.getElementById("soccerMatches");
        var cricketListEl = document.getElementById("cricketMatches");
        var noteEl = document.getElementById("updatedNote");

        setCounter(soccerEl, 0);
        setCounter(cricketEl, 0);

        function refresh() {
          Promise.allSettled([fetchSoccerMatches(), fetchCricketMatches()])
            .then(function (results) {
              if (results[0].status === "fulfilled") {
                setCounter(soccerEl, results[0].value.length);
                renderMatches(soccerListEl, results[0].value);
              }
              if (results[1].status === "fulfilled") {
                setCounter(cricketEl, results[1].value.length);
                renderMatches(cricketListEl, results[1].value);
              }
              if (results[0].status === "fulfilled" || results[1].status === "fulfilled") {
                noteEl.textContent = "Last updated " + new Date().toLocaleTimeString();
              } else {
                noteEl.textContent = "Could not reach the live data sources. Retrying in a minute.";
              }
            });
        }

        refresh();
        setInterval(refresh, REFRESH_MS);
      })();
    </script>
  </body>
</html>
